<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/admin.css">
</head>
<body class="admin-body">
    <div class="admin-wrap">
        <!-- Header -->
        <div class="admin-header">
            <h1>Admin Dashboard</h1>
            <div style="display:flex;gap:.75rem;align-items:center">
                <a href="/">← Back to Status Page</a>
                <a href="/admin/logout" style="color:#ef4444">Logout</a>
            </div>
        </div>

        <!-- Settings Panel -->
        <div class="panel" id="settings-panel">
            <h2>⚙️ Site Settings</h2>
            <form id="settings-form" enctype="multipart/form-data">
                <div class="form-row">
                    <div class="form-group">
                        <label>Site Name</label>
                        <input type="text" name="site_name" id="inp-site-name">
                    </div>
                    <div class="form-group">
                        <label>New Password (leave blank to keep)</label>
                        <input type="password" name="new_password" placeholder="••••••••">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Logo</label>
                        <input type="file" name="logo" accept="image/*">
                    </div>
                    <div style="display:flex;align-items:flex-end">
                        <button type="submit" class="btn btn-primary">Save Settings</button>
                    </div>
                </div>
                <img id="logo-preview" class="logo-preview" src="" style="display:none">
            </form>
        </div>

        <!-- Categories Panel -->
        <div class="panel">
            <h2>📁 Categories</h2>
            <div class="form-row">
                <div class="form-group">
                    <label>Category Name</label>
                    <input type="text" id="inp-cat-name" placeholder="e.g. Dedicated">
                </div>
                <div class="form-group" style="max-width:100px">
                    <label>Order</label>
                    <input type="number" id="inp-cat-order" value="0">
                </div>
                <div style="display:flex;align-items:flex-end">
                    <button class="btn btn-primary" onclick="addCategory()">Add Category</button>
                </div>
            </div>
            <table class="tbl" id="cat-table">
                <thead><tr><th>Name</th><th>Order</th><th></th></tr></thead>
                <tbody></tbody>
            </table>
        </div>

        <!-- Servers Panel -->
        <div class="panel">
            <h2>🖥️ Servers</h2>
            <div class="form-row">
                <div class="form-group">
                    <label>Server Name</label>
                    <input type="text" id="inp-srv-name" placeholder="e.g. dedi01.uk.lucid.cool">
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <select id="inp-srv-cat"></select>
                </div>
                <div class="form-group" style="max-width:120px">
                    <label>Max Net (Mbps)</label>
                    <input type="number" id="inp-srv-net" value="1000">
                </div>
                <div style="display:flex;align-items:flex-end">
                    <button class="btn btn-primary" onclick="addServer()">Add Server</button>
                </div>
            </div>
            <table class="tbl" id="srv-table">
                <thead><tr><th>Name</th><th>Category</th><th>Last Seen</th><th></th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <!-- Script Modal -->
    <div class="modal-overlay" id="script-modal">
        <div class="modal">
            <h2>🔑 Server Agent Script</h2>
            <p style="font-size:.85rem;color:#8b949e;margin-bottom:.5rem">
                Paste this script on your server and run it. It will periodically report stats to this status page.
            </p>
            <div class="script-box" id="script-content">
                <button class="copy-btn" onclick="copyScript()">Copy</button>
                <code id="script-code"></code>
            </div>
            <div class="modal-actions">
                <button class="btn btn-primary" onclick="closeScriptModal()">Close</button>
            </div>
        </div>
    </div>

    <script src="/static/js/admin.js"></script>
</body>
</html>
