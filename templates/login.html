<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;}
        .login-box{background:var(--bg-card);border-radius:12px;padding:40px;width:360px;max-width:90vw;}
        .login-box h1{font-size:22px;color:var(--text-primary);margin:0 0 24px;text-align:center;}
        .login-box input[type=password]{width:100%;padding:12px 14px;background:var(--bg-bar);border:1px solid rgba(255,255,255,0.06);
            border-radius:8px;color:var(--text-primary);font-size:15px;outline:none;box-sizing:border-box;}
        .login-box input:focus{border-color:var(--accent);}
        .login-box button{width:100%;margin-top:16px;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:8px;
            font-size:15px;font-weight:600;cursor:pointer;transition:opacity .2s;}
        .login-box button:hover{opacity:.85;}
        .login-error{color:#FF5D5D;font-size:13px;margin-top:12px;text-align:center;}
    </style>
</head>
<body>
    <div class="login-wrap">
        <form class="login-box" method="POST">
            <h1>Admin Login</h1>
            <input type="password" name="password" placeholder="Password" autofocus>
            <button type="submit">Sign in</button>
            {% if error %}<p class="login-error">{{ error }}</p>{% endif %}
        </form>
    </div>
</body>
</html>
